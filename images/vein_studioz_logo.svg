    <path d="M-60 -20 
             C-80 -40, -100 -10, -85 10
             L-70 30
             C-60 45, -40 35, -35 20
             L-20 0
             C-10 -15, -20 -30, -40 -35 Z" 
          fill="#d94be5"/>

    <path d="M0 -10 
             C-20 -30, -40 0, -25 20
             L-10 40
             C0 55, 20 45, 25 25
             L40 5
             C50 -10, 35 -25, 15 -30 Z" 
          fill="#f4c542"/>

    <path d="M-35 15 
             C-50 0, -65 25, -50 40
             L-30 60
             C-20 75, 0 65, 5 50
             L20 30
             C30 15, 15 0, -5 -5 Z" 
