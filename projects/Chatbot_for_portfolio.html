<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Chatbot</title>
    <style>
        :root {
            --bg: #699898;
            --panel: rgba(15, 23, 42, 0.96);
            --panel-light: rgba(30, 41, 59, 0.98);
            --accent: #38bdf8;
            --accent-2: #22c55e;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #374dac 0%, #2952acec 70%);
            color: var(--text);
            min-height: 100vh;
        }

        .page-wrapper {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1, h2, p {
            margin: 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        header h1 {
            font-size: clamp(2rem, 2.7vw, 3rem);
        }

        .hero-copy {
            max-width: 760px;
            line-height: 1.8;
            color: #dbeafe;
        }

        .hero-copy a {
            color: var(--accent);
            text-decoration: none;
        }

        .demo-note {
            margin-top: 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 18px;
            padding: 16px;
        }

        .chat-widget {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 340px;
            max-width: calc(100vw - 32px);
            z-index: 9999;
            display: grid;
            place-items: end;
            pointer-events: none;
        }

        .chat-window {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.35);
            overflow: hidden;
            transform: translateY(24px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease, transform 220ms ease;
        }

        .chat-window.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(14, 35, 60, 0.95);
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header h2 {
            font-size: 1rem;
            letter-spacing: 0.02em;
            color: var(--text);
        }

        .chat-header button {
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .chat-body {
            padding: 18px;
            min-height: 340px;
            max-height: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .messages {
            display: grid;
            gap: 12px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .message {
            max-width: 100%;
            padding: 14px 16px;
            border-radius: 18px;
            line-height: 1.5;
            border: 1px solid transparent;
        }

        .message.bot {
            background: rgba(255,255,255,0.08);
            border-color: rgba(148, 163, 184, 0.12);
        }

        .message.user {
            margin-left: auto;
            background: rgba(56, 189, 248, 0.14);
            border-color: rgba(56, 189, 248, 0.2);
            color: #e0f2fe;
        }

        .suggestions {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .suggestion-button,
        .link-card a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgb(48, 235, 23);
            color: #e2e8f0;
            text-decoration: none;
            cursor: pointer;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .suggestion-button:hover,
        .link-card a:hover {
            transform: translateY(-1px);
            background: rgba(56, 189, 248, 0.14);
            border-color: rgba(56, 189, 248, 0.35);
        }

        .chat-footer {
            padding: 0 18px 18px;
        }

        .chat-footer .help-text {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .sticker-button {
            position: relative;
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.16);
            background: linear-gradient(180deg, rgba(56,189,248,0.14), rgba(15,23,42,0.75));
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            cursor: pointer;
            overflow: hidden;
            display: grid;
            place-items: center;
            pointer-events: auto;
        }

        .sticker-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .sticker-button::after {
            content: 'Chat';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: #dbeafe;
            background: rgba(15, 23, 42, 0.9);
            padding: 2px 8px;
            border-radius: 999px;
        }

        .links-panel {
            display: grid;
            gap: 10px;
            margin-top: 8px;
        }

        .link-card {
            display: grid;
            gap: 10px;
            background: rgba(172, 187, 221, 0.543);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 18px;
            padding: 14px;
        }

        .link-card a {
            justify-content: flex-start;
        }

        .link-card span {
            display: block;
            font-size: 0.9rem;
            color: var(--muted);
        }

        @media (max-width: 460px) {
            .chat-widget {
                right: 16px;
                bottom: 16px;
                width: min(100%, 320px);
            }

            .suggestions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header>
            <div>
                <h1>Portfolio Chatbot Demo</h1>
                <p class="hero-copy">This page shows a right-side portfolio chatbot widget that opens from a sticker and can minimize to a small sticker button. It includes predefined questions, option buttons, and quick contact links.</p>
            </div>
        </header>

        <section class="demo-note">
            
        </section>
    </div>

    <div class="chat-widget" aria-live="polite">
        <div id="chatWindow" class="chat-window" role="dialog" aria-modal="false" aria-labelledby="chat-title">
            <div class="chat-header">
                <div>
                    <h2 id="chat-title">Hi, I’m Mohit 👋</h2>
                    <p style="color: var(--muted); font-size:0.88rem; margin-top:4px;">.</p>
                </div>
                <button id="minimizeButton" aria-label="Minimize chat">−</button>
            </div>
            <div class="chat-body">
                <div id="messages" class="messages" aria-live="polite"></div>
                <div id="suggestions" class="suggestions"></div>
            </div>
            <div class="chat-footer">
                <p class="help-text">.</p>
            </div>
        </div>

        <button class="sticker-button" id="stickerButton" aria-label="Open portfolio chatbot">
            <img id="chatSticker" src="../images/chatbot-sticker.png" alt="Chatbot sticker" loading="lazy">
        </button>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const stickerButton = document.getElementById('stickerButton');
        const minimizeButton = document.getElementById('minimizeButton');
        const messagesEl = document.getElementById('messages');
        const suggestionsEl = document.getElementById('suggestions');
        const stickerImg = document.getElementById('chatSticker');

        const chatSound = new Audio('../audio/chatbot-sound.mp3');
        chatSound.volume = 0.85;
        chatSound.addEventListener('error', () => {
            console.warn('Chat sound file not found at ../audio/chatbot-sound.mp3');
        });

        stickerImg.addEventListener('error', () => {
            stickerImg.src = '../images/profile_picture.jpg';
        });

        const links = {
            resume: 'https://halog3.github.io/portfolio/certificates/Mohit_resume.pdf',
            linkedin: 'https://www.linkedin.com/in/mohitrao2022',
            email: 'mailto:mohit.rao.333034@gmail.com',
            latestProject: 'https://halog3.github.io/notebok_lm/',
            latestTwitter: 'https://twitter.com/MOHITRao1361581',
        };

        const questions = [
            { key: 'portfolio', label: 'What is Mohit.s portfolio about?' },
            { key: 'contact', label: 'Contact Me?' },
            { key: 'resume', label: ' Resume' },
            { key: 'latestProject', label: 'My latest project' },
            { key: 'twitter', label: 'Latest Twitter post' },
            { key: 'links', label: 'Links' }
        ];

        const responses = {
            portfolio: {
                text: 'I build portfolio websites, AI chatbots, NLP tools, computer vision apps, and deploy full-stack demos. I like creating clean user experiences with interactive widgets like this one.',
                secondary: 'Want direct links to my resume, LinkedIn, or email?',
            },
            contact: {
                text: 'You can reach me by email, LinkedIn, or through the links below. I also share updates on Twitter.',
                followup: ['resume', 'links'],
            },
            resume: {
                text: 'My resume is available on the link below. Feel free to download or review it directly.',
                link: links.resume,
                linkLabel: 'Open resume',
            },
            latestProject: {
                text: 'My latest featured project is the contract summarizer and AI chatbot demo. It demonstrates practical NLP, frontend design, and deployment work.',
                link: links.latestProject,
                linkLabel: 'View latest project',
            },
            twitter: {
                text: 'My latest Twitter post is available on my profile. I post updates about AI, web development, and portfolio projects.',
                link: links.latestTwitter,
                linkLabel: 'View Twitter',
            },
            links: {
                text: 'Here are the most useful quick links for my resume, LinkedIn, email, latest project, and Twitter.',
                linkList: [
                    { label: 'Resume', href: links.resume },
                    { label: 'LinkedIn', href: links.linkedin },
                    { label: 'Email', href: links.email },
                    { label: 'Latest project', href: links.latestProject },
                    { label: 'Latest Twitter', href: links.latestTwitter }
                ]
            }
        };

        function addMessage(content, sender = 'bot') {
            const item = document.createElement('div');
            item.className = `message ${sender}`;
            item.innerHTML = content;
            messagesEl.appendChild(item);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function renderSuggestions(items) {
            suggestionsEl.innerHTML = '';
            items.forEach(item => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'suggestion-button';
                button.textContent = item.label;
                button.dataset.key = item.key;
                button.addEventListener('click', () => handleQuestion(item.key));
                suggestionsEl.appendChild(button);
            });
        }

        function showQuickLinks() {
            const response = responses.links;
            addMessage(response.text);
            const card = document.createElement('div');
            card.className = 'link-card';
            response.linkList.forEach(link => {
                const anchor = document.createElement('a');
                anchor.href = link.href;
                anchor.target = '_blank';
                anchor.rel = 'noreferrer noopener';
                anchor.textContent = link.label;
                card.appendChild(anchor);
            });
            messagesEl.appendChild(card);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            renderSuggestions(questions);
        }

        function handleQuestion(key) {
            const selected = questions.find(q => q.key === key);
            addMessage(selected.label, 'user');

            if (key === 'links') {
                showQuickLinks();
                return;
            }

            const response = responses[key];
            let html = response.text;
            if (response.link) {
                html += `<div class="link-card"><a href="${response.link}" target="_blank" rel="noreferrer noopener">${response.linkLabel}</a></div>`;
            }
            if (response.linkList) {
                html += '<div class="link-card">';
                response.linkList.forEach(link => {
                    html += `<a href="${link.href}" target="_blank" rel="noreferrer noopener">${link.label}</a>`;
                });
                html += '</div>';
            }
            addMessage(html);

            if (response.followup) {
                const followOptions = response.followup.map(key => {
                    const item = questions.find(q => q.key === key);
                    return { key: item.key, label: item.label };
                });
                renderSuggestions(followOptions);
            } else {
                renderSuggestions(questions);
            }
        }

        function openChat() {
            chatWindow.classList.add('open');
            chatSound.play().catch(() => {});
            if (!messagesEl.hasChildNodes()) {
                addMessage('Hello! I’m your portfolio chatbot. What would you like to ask?', 'bot');
                renderSuggestions(questions);
            }
        }

        function closeChat() {
            chatWindow.classList.remove('open');
        }

        stickerButton.addEventListener('click', () => {
            if (chatWindow.classList.contains('open')) {
                closeChat();
            } else {
                openChat();
            }
        });

        minimizeButton.addEventListener('click', () => {
            closeChat();
        });

        openChat();
    </script>
</body>
</html>
